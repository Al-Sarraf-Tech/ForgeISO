name: forgeiso-ci

on:
  push:
    branches: ["**"]
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

# Restrict default GITHUB_TOKEN to read-only; release job escalates to write.
permissions:
  contents: read

# Cancel redundant runs on the same branch (PRs and pushes).
# Tag-triggered runs (releases) are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# ── CI: 7 stages, all run in parallel ephemeral containers ───────────────────
#
# Each matrix entry spins up its own GitHub-hosted runner (ubuntu-latest).
# Every runner is a fresh, ephemeral VM — no state leaks between stages.
# All 7 stages start simultaneously (max-parallel: 7, fail-fast: false).
# All 7 must pass before the release job is allowed to proceed.
#
# Cache keys are per-stage (matrix.id) so Cargo artifacts never cross-contaminate.
# The container itself is ephemeral: --rm on docker run destroys it after the stage.

jobs:
  ci-stage:
    name: "${{ matrix.label }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false       # all stages run even if one fails — full report always
      max-parallel: 7        # spin up all 7 simultaneously
      matrix:
        include:
          - id: c1
            label: "C1 Rust (fmt · clippy · test)"
            dockerfile: containers/C1.rust.Dockerfile
            script: scripts/ci/c1-rust.sh
            cache: rust

          - id: c2
            label: "C2 SBOM + Audit (cargo-deny · cargo-audit · syft)"
            dockerfile: containers/C2.sbom.Dockerfile
            script: scripts/ci/c2-sbom.sh
            cache: rust

          - id: c3
            label: "C3 GUI (forge-gui + legacy Tauri build)"
            dockerfile: containers/C3.gui.Dockerfile
            script: scripts/ci/c3-gui.sh
            cache: rust

          - id: c4
            label: "C4 Security (trivy · syft · grype)"
            dockerfile: containers/C4.security.Dockerfile
            script: scripts/ci/c4-security.sh
            cache: security

          - id: c5
            label: "C5 Integration (build · inject smoke)"
            dockerfile: containers/C5.integration.Dockerfile
            script: scripts/ci/c5-integration.sh
            cache: rust

          - id: c6
            label: "C6 E2E Smoke (QEMU boot)"
            dockerfile: containers/C6.e2e.Dockerfile
            script: scripts/ci/c6-e2e.sh
            cache: rust

          - id: c7
            label: "C7 Lint (fmt · clippy)"
            dockerfile: containers/C7.lint.Dockerfile
            script: scripts/ci/c7-lint.sh
            cache: rust

    steps:
      - uses: actions/checkout@v4

      # ── Per-stage Cargo cache (registry + git + target) ──────────────────
      # Key is per stage ID so no cross-contamination of compiled artifacts.
      - name: Cache Cargo
        if: matrix.cache == 'rust'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/${{ matrix.id }}
          key: cargo-${{ runner.os }}-${{ matrix.id }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.id }}-

      - name: Cache Scanner DB
        if: matrix.cache == 'security'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/trivy
            ~/.cache/grype
          key: scanner-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            scanner-${{ runner.os }}-

      # ── Build the CI image for this stage ─────────────────────────────────
      - name: Build CI image
        run: |
          docker build \
            --tag forgeiso-${{ matrix.id }} \
            --file ${{ matrix.dockerfile }} \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      # ── Run the stage in a fresh ephemeral container ──────────────────────
      # Source is mounted writable — Cargo creates .cargo-tmp scratch files
      # in the workspace; :ro causes "Read-only file system" errors.
      # Build isolation is provided by per-stage CARGO_TARGET_DIR volumes.
      # Container is deleted immediately after (--rm).
      - name: Run ${{ matrix.id }} (ephemeral container)
        run: |
          docker run --rm \
            --name "forgeiso-ci-${{ matrix.id }}-${{ github.run_id }}" \
            -e CI=true \
            -e CARGO_TARGET_DIR=/ci-target \
            -e CARGO_HOME=/ci-cargo \
            -v "$PWD:/workspace" \
            -v "forgeiso-ci-${{ matrix.id }}-target:/ci-target" \
            -v "forgeiso-ci-${{ matrix.id }}-cargo:/ci-cargo" \
            forgeiso-${{ matrix.id }} \
            bash -c "${{ matrix.script }}"

      # ── Destroy ephemeral volumes on completion ───────────────────────────
      - name: Destroy ephemeral volumes
        if: always()
        run: |
          docker volume rm \
            "forgeiso-ci-${{ matrix.id }}-target" \
            "forgeiso-ci-${{ matrix.id }}-cargo" \
            2>/dev/null || true
          docker image rm forgeiso-${{ matrix.id }} 2>/dev/null || true

      # ── Upload stage artifacts ─────────────────────────────────────────────
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgeiso-${{ matrix.id }}-artifacts
          path: |
            artifacts/**
            **/build-report.json
            **/build-report.html
            **/sbom.cdx.json
            **/sbom.spdx.json
          if-no-files-found: ignore

  # ── Shell lint: shellcheck + shfmt on all project shell scripts ────────────
  shell-lint:
    name: "Shell Lint (shellcheck · shfmt)"
    runs-on: ubuntu-latest
    continue-on-error: true     # advisory until shell scripts are reformatted
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
        env:
          GOFLAGS: ""

      - name: shellcheck (advisory)
        run: |
          find scripts .github/scripts -name '*.sh' -type f \
            -not -path '*/node_modules/*' \
            -print0 \
          | xargs -0 shellcheck --severity=warning --shell=bash || echo "::warning::shellcheck found issues (advisory, non-blocking)"

      - name: shfmt (advisory)
        run: |
          find scripts .github/scripts -name '*.sh' -type f \
            -not -path '*/node_modules/*' \
            -print0 \
          | xargs -0 shfmt -d -i 2 -ci -bn || echo "::warning::shfmt found formatting issues (advisory, non-blocking)"

  package-verify:
    if: "!startsWith(github.ref, 'refs/tags/v')"
    needs: ci-stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            ruby \
            ruby-dev \
            rpm \
            squashfs-tools \
            mtools \
            xorriso \
            libarchive-tools
          sudo gem install fpm --no-document

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo (package verify)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-package-verify-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-package-verify-

      - name: Install GTK3 (required for forge-gui)
        run: |
          sudo apt-get install -y \
            libgtk-3-dev \
            libwayland-dev \
            libegl-dev \
            libgl-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Build Rust binaries
        run: |
          cargo build --release -p forgeiso-cli
          cargo build --release -p forgeiso-tui
          cargo build --release -p forge-slint
          cargo build --release -p forge-gui

      - name: Build and verify release packages
        run: |
          VERSION="$(sed -n 's/^version = \"\\([^\"]*\\)\"$/\\1/p' Cargo.toml | head -n1)"
          bash scripts/release/make-packages.sh "${VERSION}"
          bash scripts/release/verify-release.sh "${VERSION}"

# ── Release: fires only after all 7 CI stages pass ───────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci-stage
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            ruby \
            ruby-dev \
            rpm \
            squashfs-tools \
            mtools \
            xorriso \
            libarchive-tools
          sudo gem install fpm --no-document
          SYFT_VERSION=v1.42.1
          curl -sSfL "https://raw.githubusercontent.com/anchore/syft/${SYFT_VERSION}/install.sh" \
            -o /tmp/install-syft.sh \
            && sudo sh /tmp/install-syft.sh -b /usr/local/bin "${SYFT_VERSION}" \
            && rm -f /tmp/install-syft.sh \
            || echo "WARNING: syft installation failed, continuing without SBOM"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo (release)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-release-

      - name: Install GTK3 (required for forge-gui)
        run: |
          sudo apt-get install -y \
            libgtk-3-dev \
            libwayland-dev \
            libegl-dev \
            libgl-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Build Rust binaries
        run: |
          cargo build --release -p forgeiso-cli
          cargo build --release -p forgeiso-tui
          cargo build --release -p forge-slint
          cargo build --release -p forge-gui

      - name: Build all release packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/release/make-packages.sh "${VERSION}"

      - name: Verify packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/release/verify-release.sh "${VERSION}"

      - name: Generate SBOM
        run: |
          if command -v syft >/dev/null 2>&1; then
            syft dir:. -o cyclonedx-json > dist/release/sbom.cdx.json
            syft dir:. -o spdx-json      > dist/release/sbom.spdx.json
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/release/forgeiso-*-1.x86_64.rpm
            dist/release/forgeiso_*-1_amd64.deb
            dist/release/forgeiso-*-1-x86_64.pkg.tar.zst
            dist/release/forgeiso-*-linux-x86_64.tar.gz

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/forgeiso-*-1.x86_64.rpm
            dist/release/forgeiso_*-1_amd64.deb
            dist/release/forgeiso-*-1-x86_64.pkg.tar.zst
            dist/release/forgeiso-*-linux-x86_64.tar.gz
            dist/release/checksums.txt
            dist/release/sbom.cdx.json
            dist/release/sbom.spdx.json
          generate_release_notes: false
