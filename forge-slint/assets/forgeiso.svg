<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#12171e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ba1fa"/>
      <stop offset="100%" stop-color="#4d8ef7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d8ef7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4d8ef7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="#252d38" stroke-width="2"/>
  <!-- Disc (ISO) -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <circle cx="256" cy="240" r="40" fill="none" stroke="#4d8ef7" stroke-width="4" opacity="0.6"/>
  <circle cx="256" cy="240" r="90" fill="none" stroke="#4d8ef7" stroke-width="1.5" opacity="0.2"/>
  <!-- Center dot -->
  <circle cx="256" cy="240" r="8" fill="#4d8ef7"/>
  <!-- Hammer/forge symbol overlaid -->
  <g transform="translate(256,240)" opacity="0.9">
    <!-- Anvil base -->
    <rect x="-60" y="40" width="120" height="16" rx="4" fill="#45c26b"/>
    <!-- Hammer head -->
    <rect x="-20" y="-80" width="40" height="24" rx="4" fill="#e8edf4"/>
    <!-- Hammer handle -->
    <rect x="-4" y="-56" width="8" height="80" rx="3" fill="#a3adb8"/>
  </g>
  <!-- Glow effect under disc -->
  <ellipse cx="256" cy="400" rx="120" ry="20" fill="url(#glow)"/>
  <!-- "ForgeISO" text -->
  <text x="256" y="440" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="700" fill="#e8edf4" letter-spacing="-1">ForgeISO</text>
  <text x="256" y="470" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="400" fill="#7a8696">Linux ISO Builder</text>
</svg>
